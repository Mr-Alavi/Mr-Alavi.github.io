<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | T . R . O . R</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        
        body { 
            margin: 0; 
            background: url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Vazirmatn', sans-serif; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .close-btn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            font-size: 2rem; 
            color: #40a9ff; 
            text-decoration: none; 
            z-index: 10; 
        }

        .slider-container { 
            width: 90vw; 
            max-width: 400px; 
            height: 250px; 
            overflow-x: scroll; 
            display: flex; 
            gap: 10px; 
            scroll-snap-type: x mandatory; 
            margin-top: 80px; 
            border-radius: 15px; 
            border: 1px solid rgba(64, 169, 255, 0.3); 
        }
        
        .slider-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            scroll-snap-align: center; 
            border-radius: 15px; 
            flex-shrink: 0;
        }

        /* کادر جدید برای متن */
        .text-container { 
            margin: 20px 0; 
            padding: 15px; 
            width: 85%; 
            max-width: 350px; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(64, 169, 255, 0.3); 
            border-radius: 12px; 
            text-align: center; 
            color: #e0e0e0; 
            line-height: 1.6; 
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .btn-wrapper { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: 45vw; 
            margin-bottom: 30px;
        }
        
        .btn-unified { 
            padding: 8px; 
            border: 1px solid #40a9ff; 
            border-radius: 8px; 
            background: rgba(0,0,0,0.3); 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            font-size: 0.7rem; 
            transition: 0.3s; 
        }
        
        .btn-unified:hover { 
            background: rgba(64, 169, 255, 0.2); 
            box-shadow: 0 0 15px rgba(64, 169, 255, 0.3);
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-btn">×</a>

    <div class="slider-container">
        <img src="p1.jpg" alt="Project 1">
        <img src="p2.jpg" alt="Project 2">
        <img src="p3.jpg" alt="Project 3">
    </div>

    <!-- متن قرار گرفته داخل کادر جدید -->
    <div class="text-container">
        دنیای دیجیتال منتظر ایده توست! فرقی نمی‌کند یک سایت شخصی مینیمال بخواهی، یا یک فروشگاه آنلاین حرفه‌ای برای کسب‌وکارت. من اینجا هستم تا ایده‌های تو را به یک وب‌سایت خاص و سریع تبدیل کنم. همین حالا شروع کن.
    </div>

    <div class="btn-wrapper">
        <a href="https://t.me/Mr_alavi_x" target="_blank" class="btn-unified">سفارش سایت اختصاصی</a>
    </div>

</body>
</html>
