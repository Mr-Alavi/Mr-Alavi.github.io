    body {

    .talk-button-wrapper { display: flex; align-items: center; gap: 8px; }

    .animated-arrow {

    @keyframes bounceLeft {

<script>
const title = "Hi, I'm Mr. Alavi 👋";
const subtitle = "Without Fear. Without Limits!";
const paragraph = "به وب‌سایت رسمی من خوش آمدید.\nاینجا جایی است که ایده‌ها به واقعیت تبدیل می‌شوند .🌹";

function typeText(element, text, speed, callback) {
    let i = 0;
    element.innerHTML = ""; 
    function run() {
        if (i < text.length) {
            element.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(run, speed);
        } else if (callback) {
            callback();
        }
    }
    run();
}

document.addEventListener("DOMContentLoaded", function () {
    const titleEl = document.getElementById("titleTyping");
    const subEl = document.getElementById("subTyping");
    const textEl = document.getElementById("textTyping");

    if (sessionStorage.getItem("visited")) {
        titleEl.innerHTML = title;
        subEl.innerHTML = subtitle;
        textEl.innerHTML = paragraph.replace(/\n/g, "<br>");
    } else {
        typeText(titleEl, title, 80, function () {
            typeText(subEl, subtitle, 100, function () {
                typeText(textEl, paragraph, 70);
            });
        });
        sessionStorage.setItem("visited", "true");
    }
});
</script>
    <script>
    // جلوگیری از کش شدن صفحه اصلی توسط مرورگر
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            window.location.reload();
        }
    });

    // تشخیص کشیدن صفحه به پایین (Pull-to-Refresh)
    let touchStartY = 0;
    window.addEventListener('touchstart', e => {
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    window.addEventListener('touchend', e => {
        let touchEndY = e.changedTouches[0].screenY;
        // اگر کاربر صفحه را به پایین کشید (بیش از ۱۰۰ پیکسل)
        if (touchEndY - touchStartY > 100 && window.scrollY === 0) {
            window.location.href = "index.html";
        }
    }, {passive: true});
</script>
