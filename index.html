<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | T . R . O . R</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: opacity 1.5s ease; }
        .container { border: 2px solid #8a2be2; padding: 40px; border-radius: 20px; text-align: center; }
        #text-1, #text-2 { color: #40a9ff; font-family: sans-serif; font-size: 1.5rem; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <span id="text-1"></span>
        <span id="text-2"></span>
    </div>
    <script>
        const t1 = "You Are Here.";
        const t2 = "The Official Website of Hossein Alavi.";
        function type(id, text, speed, cb) {
            let i = 0;
            const el = document.getElementById(id);
            const run = () => {
                if (i < text.length) { el.innerHTML += text[i++]; setTimeout(run, speed); }
                else if (cb) cb();
            };
            run();
        }
        window.onload = () => {
            type("text-1", t1, 100, () => type("text-2", t2, 50, () => {
                setTimeout(() => { document.body.style.opacity = "0"; setTimeout(() => window.location.href = "home.html", 1500); }, 2000);
            }));
        };
    </script>
</body>
</html>
