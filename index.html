<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T . R . O . R - Mr. Alavi</title>
    
    <!-- اتصال به استایل‌های نسخه دوم -->
    <link rel="stylesheet" href="mr-alavi-v2.css">
    
    <style>
        /* تنظیمات پایه برای فونت‌های استاندارد و چپ‌چین بودن قطعی تمام متون */
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: left;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ساختار کادر تصاویر برای جلوگیری از زوم و برش */
        .image-container {
            width: 100%;
            height: 250px;
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 20px;
            /* این سه خط باعث می‌شوند عکس کامل در کادر جا شود */
            background-size: contain;
            background-position: center left;
            background-repeat: no-repeat;
        }

        /* استایل پایه برای کارت‌ها تا افکت شیشه‌ای V2 روی آن‌ها اعمال شود */
        .card {
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
        }

        .header-title {
            color: #40a9ff;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 15px;
            justify-content: flex-start;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: #40a9ff;
        }
    </style>
</head>
<body>

    <!-- بخش هدر و معرفی -->
    <header class="card">
        <h1 class="header-title">T . R . O . R</h1>
        <h2>Hi, I'm Mr. Alavi</h2>
        <p>Web Designer & Developer - Crafting Modern User Interfaces</p>
    </header>

    <!-- منوی دسترسی سریع -->
    <nav class="card">
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="chat.html">Chat</a></li>
        </ul>
    </nav>

    <!-- ترمینال تعاملی V2 -->
    <div class="mralavi-v2-terminal">
        <p>> System initialized...</p>
        <p>> Welcome to T . R . O . R network.</p>
        <input type="text" class="mralavi-v2-terminal-input" placeholder="Type command here...">
    </div>

    <!-- بخش محتوای اصلی (نمونه کارت پروژه) -->
    <main>
        <div class="card mralavi-v2-card">
            <h3>Recent Activity</h3>
            <!-- کادر تصویر استاندارد -->
            <div class="image-container" style="background-image: url('your-image.jpg');"></div>
            <p>این یک متن تستی فارسی است که برای حفظ یکپارچگی طراحی، از سمت چپ نوشته شده و تراز شده است.</p>
        </div>
    </main>

    <!-- اتصال به موتور تعاملی نسخه دوم -->
    <script src="mr-alavi-v2.js"></script>
    
</body>
</html>
